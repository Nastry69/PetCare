
# ================================================================
# PetCare — Docker Compose (stack complète)
# ================================================================
# Services :
#   - app      : PHP 8.4-FPM + Symfony 7.4 (API REST)
#   - nginx    : Reverse proxy API (port 8000 → app:9000)
#   - frontend : React 19 build de production (port 3000 → nginx)
#   - database : PostgreSQL 16
#   - worker   : Symfony Messenger consumer (rappels email planifiés à 8h)
#   - mailer   : Mailpit — SMTP dev (SMTP:1025 / Web:8025)
#
# ── Démarrage en UN CLIC ────────────────────────────────────────
#   docker compose up -d --build
#
#   L'entrypoint PHP gère automatiquement :
#     • Génération des clés JWT (si absentes)
#     • Migrations Doctrine (schéma + données de base)
#     • Warmup du cache Symfony (prod)
#
# ── Autres commandes ────────────────────────────────────────────
#   Arrêt    : docker compose down
#   Logs     : docker compose logs -f
#   Reset DB : docker compose down -v && docker compose up -d --build
# ================================================================

services:

  # ── Application Symfony (PHP-FPM) ──────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/app:rw,cached
      - ./backend/config/jwt:/app/config/jwt:rw
      - uploads_data:/app/public/uploads
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-petcare_app_secret_change_in_production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-petcare}?serverVersion=16&charset=utf8
      MAILER_DSN: ${MAILER_DSN:-smtp://mailer:1025}
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL:-noreply@petcare.fr}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-PetCare}
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$$'
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-petcare_jwt_passphrase}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx — API Backend (port 8000) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - ./backend:/app:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/app/public/uploads:ro
    depends_on:
      - app
    restart: unless-stopped

  # ── Frontend React (production, port 3000) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - nginx
    restart: unless-stopped

  # ── Base de données (PostgreSQL 16) ────────────────────────────
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petcare}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-petcare}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    restart: unless-stopped

  # ── Worker Symfony Messenger (rappels planifiés) ───────────────
  worker:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    command: ["php", "bin/console", "messenger:consume", "scheduler_default", "--time-limit=3600", "--memory-limit=128M", "-vv"]
    volumes:
      - ./backend:/app:rw,cached
      - ./backend/config/jwt:/app/config/jwt:rw
      - uploads_data:/app/public/uploads
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-petcare_app_secret_change_in_production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-petcare}?serverVersion=16&charset=utf8
      MAILER_DSN: ${MAILER_DSN:-smtp://mailer:1025}
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL:-noreply@petcare.fr}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-PetCare}
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-petcare_jwt_passphrase}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      WORKER_MODE: "1"
    depends_on:
      database:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  # ── Mailpit — SMTP de développement ────────────────────────────
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web → http://localhost:8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  database_data:
  uploads_data:
